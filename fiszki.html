<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fiszki z NotebookLM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22223a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: #888;
    --front-bg: #1e1b3a;
    --back-bg: #1a2e1a;
    --front-border: #7c6af7;
    --back-border: #4ade80;
    --radius: 18px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 16px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--accent2);
    text-align: center;
  }

  /* ── Upload screen ── */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 480px;
    margin-top: 24px;
  }

  .drop-zone {
    width: 100%;
    border: 2px dashed var(--accent);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: background .2s, border-color .2s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--surface2);
    border-color: var(--accent2);
  }
  .drop-zone svg { opacity: .6; margin-bottom: 12px; }
  .drop-zone p { color: var(--muted); font-size: .9rem; line-height: 1.5; }
  .drop-zone strong { color: var(--text); }

  #file-input { display: none; }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    touch-action: manipulation;
  }
  .btn:active { opacity: .8; transform: scale(.97); }
  .btn.secondary {
    background: var(--surface2);
    color: var(--accent2);
    border: 1px solid var(--accent);
  }
  .btn.danger { background: #c0392b; }

  .hint {
    font-size: .8rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    max-width: 360px;
  }

  /* ── Study screen ── */
  #study-screen { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 540px; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 8px;
  }

  .progress-wrap { flex: 1; }
  .progress-label { font-size: .75rem; color: var(--muted); margin-bottom: 4px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

  .counter { font-size: .85rem; color: var(--muted); white-space: nowrap; }

  /* ── Card ── */
  .card-scene {
    width: 100%;
    perspective: 1200px;
    cursor: pointer;
    user-select: none;
    touch-action: pan-y;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 260px;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: var(--shadow);
    word-break: break-word;
  }
  .card-face.front {
    background: var(--front-bg);
    border: 1.5px solid var(--front-border);
    min-height: 260px;
  }
  .card-face.back {
    background: var(--back-bg);
    border: 1.5px solid var(--back-border);
    transform: rotateY(180deg);
    min-height: 260px;
  }

  .card-label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: .55;
  }
  .front .card-label { color: var(--accent2); }
  .back  .card-label { color: #4ade80; }

  .card-text { font-size: clamp(.95rem, 3vw, 1.15rem); line-height: 1.55; }

  .flip-hint { font-size: .72rem; color: var(--muted); margin-top: 14px; }

  /* ── Nav buttons ── */
  .nav-row {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }
  .nav-row .btn { flex: 1; max-width: 160px; padding: 12px; font-size: .95rem; }

  /* ── Result ── */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 400px;
    margin-top: 20px;
    text-align: center;
  }
  .result-icon { font-size: 3.5rem; }
  .result-title { font-size: 1.4rem; font-weight: 700; color: var(--accent2); }
  .result-sub { color: var(--muted); font-size: .9rem; }

  /* ── Shuffle toggle ── */
  .shuffle-row { display: flex; align-items: center; gap: 10px; font-size: .85rem; color: var(--muted); }
  .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .slider {
    position: absolute; inset: 0;
    background: var(--surface2);
    border-radius: 99px;
    transition: background .2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform .2s, background .2s;
  }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(16px); background: #fff; }

  /* ── Swipe animation hint ── */
  @keyframes swipe-hint {
    0%   { transform: translateX(0); opacity: 1; }
    40%  { transform: translateX(18px); opacity: .6; }
    60%  { transform: translateX(-14px); opacity: .6; }
    100% { transform: translateX(0); opacity: 1; }
  }
  .card-scene.hint-anim .card-inner { animation: swipe-hint .5s ease; }
</style>
</head>
<body>

<h1>Fiszki z NotebookLM</h1>

<!-- ══ UPLOAD ══ -->
<div id="upload-screen">
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p><strong>Wgraj plik CSV</strong><br>z fiszek NotebookLM<br><br>lub kliknij, żeby wybrać plik</p>
  </div>
  <input type="file" id="file-input" accept=".csv,text/csv">

  <p class="hint">
    W NotebookLM: <strong>Studio &rarr; Fiszki &rarr; Pobierz</strong><br>
    Aplikacja działa w całości w przeglądarce &mdash; plik nigdzie nie jest wysyłany.
  </p>
</div>

<!-- ══ STUDY ══ -->
<div id="study-screen">
  <div class="top-bar">
    <div class="progress-wrap">
      <div class="progress-label" id="prog-label">Karta 1 z 1</div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <span class="counter" id="counter-badge"></span>
    <button class="btn secondary" style="padding:8px 14px;font-size:.8rem" onclick="resetToUpload()">Nowy CSV</button>
  </div>

  <div class="shuffle-row">
    <label class="toggle"><input type="checkbox" id="shuffle-toggle" onchange="toggleShuffle()"><span class="slider"></span></label>
    Losowa kolejność
  </div>

  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face front">
        <div class="card-label">Pytanie</div>
        <div class="card-text" id="card-front"></div>
        <div class="flip-hint">Dotknij, żeby odwrócic</div>
      </div>
      <div class="card-face back">
        <div class="card-label">Odpowiedz</div>
        <div class="card-text" id="card-back"></div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn secondary" id="btn-prev" onclick="prevCard()">&#8592; Poprzednia</button>
    <button class="btn" id="btn-next" onclick="nextCard()">Nastepna &#8594;</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="result-screen">
  <div class="result-icon">🎉</div>
  <div class="result-title">Gotowe!</div>
  <div class="result-sub" id="result-sub"></div>
  <button class="btn" onclick="restartDeck()">Powtorz od poczatku</button>
  <button class="btn secondary" onclick="resetToUpload()">Wgraj nowy CSV</button>
</div>

<script>
// ── State ──────────────────────────────────────────────
let cards = [];        // [{front, back}]
let order = [];        // indices into cards[]
let current = 0;
let flipped = false;
let shuffleOn = false;

// ── File handling ──────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

// ── CSV parser (handles quotes, semicolons, commas) ────
function parseCSV(text) {
  // Detect delimiter: semicolon wins if more semicolons than commas in first line
  const firstLine = text.split('\n')[0] || '';
  const delim = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';

  const rows = splitCSVRows(text, delim);
  const parsed = [];

  for (const row of rows) {
    if (row.length < 2) continue;
    const front = row[0].trim();
    const back  = row[1].trim();
    if (!front && !back) continue;
    // Skip header rows like "Front,Back" or "Pytanie,Odpowiedz"
    if (parsed.length === 0) {
      const fl = front.toLowerCase(), bl = back.toLowerCase();
      if ((fl === 'front' || fl === 'pytanie' || fl === 'question' || fl === 'term') &&
          (bl === 'back'  || bl === 'odpowiedź' || bl === 'odpowiedz' || bl === 'answer' || bl === 'definition')) continue;
    }
    parsed.push({ front, back });
  }

  if (parsed.length === 0) {
    alert('Nie znaleziono fiszek w pliku. Upewnij się, że to plik CSV z NotebookLM z dwiema kolumnami.');
    return;
  }

  cards = parsed;
  startDeck();
}

function splitCSVRows(text, delim) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuote = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') {
        if (text[i+1] === '"') { cell += '"'; i++; }
        else inQuote = false;
      } else {
        cell += ch;
      }
    } else {
      if (ch === '"') {
        inQuote = true;
      } else if (ch === delim) {
        row.push(cell); cell = '';
      } else if (ch === '\n') {
        row.push(cell); cell = '';
        rows.push(row); row = [];
      } else if (ch === '\r') {
        // skip
      } else {
        cell += ch;
      }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ── Deck logic ─────────────────────────────────────────
function startDeck() {
  current = 0;
  buildOrder();
  show('study-screen');
  showCard();
}

function buildOrder() {
  order = cards.map((_, i) => i);
  if (shuffleOn) shuffle(order);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  const card = cards[order[current]];
  document.getElementById('card-front').textContent = card.front;
  document.getElementById('card-back').textContent  = card.back;
  setFlipped(false);
  updateProgress();
  document.getElementById('btn-prev').disabled = current === 0;
}

function setFlipped(val) {
  flipped = val;
  document.getElementById('card-inner').classList.toggle('flipped', val);
}

function flipCard() { setFlipped(!flipped); }

function nextCard() {
  if (current < order.length - 1) {
    current++;
    showCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (current > 0) { current--; showCard(); }
}

function updateProgress() {
  const total = order.length;
  const pct = Math.round(((current + 1) / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Karta ${current + 1} z ${total}`;
  document.getElementById('counter-badge').textContent = `${pct}%`;
  document.getElementById('btn-next').textContent = current < total - 1 ? 'Nastepna →' : 'Zakoncz ✓';
}

function toggleShuffle() {
  shuffleOn = document.getElementById('shuffle-toggle').checked;
  buildOrder();
  current = 0;
  showCard();
}

function showResult() {
  document.getElementById('result-sub').textContent = `Przejrzano ${cards.length} fiszek.`;
  show('result-screen');
}

function restartDeck() {
  show('study-screen');
  startDeck();
}

function resetToUpload() {
  cards = []; order = []; current = 0;
  fileInput.value = '';
  show('upload-screen');
}

function show(id) {
  ['upload-screen','study-screen','result-screen'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id ? 'flex' : 'none';
  });
}

// ── Touch / swipe ──────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
const scene = document.getElementById('card-scene');

scene.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

scene.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 40) return; // vertical scroll or tiny move
  e.preventDefault();
  if (dx < 0) nextCard();
  else prevCard();
}, { passive: false });

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('study-screen').style.display === 'none') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});
</script>
</body>
</html>
